<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preferences - Job Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">Job Tracker</h1>
            <div class="nav-links">
                <a href="index.html">Jobs</a>
                <a href="preferences.html">Preferences</a>
                <a href="digest.html">Daily Digest</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <h2>Set Your Preferences</h2>
        <form id="preferencesForm" class="preferences-form">
            <div class="form-group">
                <label>Preferred Locations</label>
                <input type="text" id="locations" placeholder="e.g., Remote, New York, San Francisco">
            </div>
            <div class="form-group">
                <label>Minimum Match Score</label>
                <input type="number" id="minScore" min="0" max="100" value="70">
            </div>
            <button type="submit" class="btn btn-primary">Save Preferences</button>
        </form>
        <div id="message" class="message"></div>
    </main>

    <script src="preferences.js"></script>
</body>
</html>
